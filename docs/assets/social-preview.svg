<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Origin social preview</title>
  <desc id="desc">Origin: Where AI work compounds. Decisions, lessons, project context, and wiki pages.</desc>

