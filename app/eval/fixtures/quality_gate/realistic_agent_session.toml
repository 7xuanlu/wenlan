memory_type = "fact"

[[cases.negative_seeds]]
id = "junk_onboard_sysprompt"
content = "You are a helpful engineering assistant. Help the developer understand the codebase by explaining architecture decisions clearly and concisely."
memory_type = "fact"

[[cases.negative_seeds]]
