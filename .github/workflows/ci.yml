name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # PRs: cancel superseded pushes to save runner time. main: never cancel, so
  # every code-push's L6 eval canary runs to completion. A cancelled canary plus
  # a release commit that skips the test job left 0.9.1 with no canary run.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      rust:    ${{ steps.filter.outputs.rust }}
      docs:    ${{ steps.filter.outputs.docs }}
      plugin:  ${{ steps.filter.outputs.plugin }}
      npm:     ${{ steps.filter.outputs.npm }}
      macos:   ${{ steps.filter.outputs.macos }}
      windows: ${{ steps.filter.outputs.windows }}
      windows-lint: ${{ steps.filter.outputs.windows-lint }}
      windows-release: ${{ steps.filter.outputs.windows-release }}
      mcp-platform: ${{ steps.filter.outputs.mcp-platform }}
      # Test matrix OSes as a JSON array. On PRs, Windows is included only when
      # Windows-affecting files changed. Non-PR runs keep the full backstop.
      test-oses: ${{ steps.matrix.outputs.json }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            rust:
              # Positive-only globs. With dorny/paths-filter's default
              # `some` quantifier, a negative glob like `!crates/*/npm/**`
              # makes README-only PRs match this filter.
              - 'crates/**/*.rs'
              # Native sources bootstrap the drift guard that verifies their
              # platform route; otherwise a new file could skip its own check.
              - 'crates/**/*.c'
              - 'crates/**/*.cc'
              - 'crates/**/*.cpp'
              - 'crates/**/*.cxx'
              - 'crates/**/*.h'
              - 'crates/**/*.hh'
              - 'crates/**/*.hpp'
              - 'crates/**/*.hxx'
              - 'crates/**/*.m'
              - 'crates/**/*.mm'
              - 'crates/**/Cargo.toml'
              - 'crates/*/resources/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.config/nextest.toml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/coverage.yml'
              - '.github/workflows/release.yml'
              - 'docker/**'
              - 'scripts/**'
              # Release PRs must run the drift guard: 0.10.1 merged with
              # version drift precisely because these two files don't match
              # any glob above, so the rust tests (incl. drift_guard) skipped
              # on the one PR class most likely to introduce drift.
              - 'version.txt'
              - '.release-please-manifest.json'
              # Same hole, plugin edition: crates/wenlan-cli/tests/distribution.rs
              # asserts on the plugin manifests, so a plugin-only PR could break
              # it and still show green -- the rust tests never ran.
              - 'plugin/**'
              - '.claude-plugin/**'
            plugin:
              - 'plugin/**'
              - 'plugin-codex/**'
              - '.agents/plugins/**'
              # The Claude marketplace is contract-checked too; without this
              # glob a PR touching only the storefront skips the guard.
              - '.claude-plugin/**'
              - 'plugin-contract.json'
              - 'scripts/validate-codex-plugin-slice.py'
              - 'scripts/validate-plugin-contract.py'
              - 'scripts/validate-plugin-contract.test.sh'
            docs:
              - 'README.md'
              - 'README.zh-Hans.md'
              - 'README.zh-Hant.md'
              - 'docs/eval/**'
              - 'scripts/check-readme-translations.py'
              - 'scripts/check-readme-translations.test.sh'
              - 'scripts/update-readme-eval.py'
              - 'scripts/update-readme-eval.test.py'
              - 'scripts/validate-versions.sh'
              - 'scripts/validate-versions.test.sh'
              - '.github/workflows/ci.yml'
              - '.github/workflows/release.yml'
            npm:
              - 'crates/*/npm/**'
            macos:
              # macOS owns launchd/host-activity behavior and its native build
              # surface. Every current Rust file with a macOS cfg marker is
              # covered here; drift_guard fails if a future one is not.
              - 'crates/wenlan-cli/src/**'
              - 'crates/wenlan-cli/tests/**'
              - 'crates/wenlan-core/src/drift_guard.rs'
              - 'crates/wenlan-core/src/config.rs'
              - 'crates/wenlan-core/src/export/knowledge.rs'
              - 'crates/wenlan-core/src/lint/**'
              - 'crates/wenlan-core/src/llm_provider.rs'
              - 'crates/wenlan-core/src/repair.rs'
              - 'crates/wenlan-core/src/repair/**'
              - 'crates/wenlan-core/src/repair_plan/**'
              - 'crates/wenlan-core/src/sources/directory.rs'
              - 'crates/**/*.c'
              - 'crates/**/*.cc'
              - 'crates/**/*.cpp'
              - 'crates/**/*.cxx'
              - 'crates/**/*.h'
              - 'crates/**/*.hh'
              - 'crates/**/*.hpp'
              - 'crates/**/*.hxx'
              - 'crates/**/*.m'
              - 'crates/**/*.mm'
              - 'crates/wenlan-mcp/src/**'
              - 'crates/wenlan-mcp/Cargo.toml'
              - 'crates/wenlan-mcp/build.rs'
              - 'crates/wenlan-types/src/**'
              - 'crates/wenlan-types/Cargo.toml'
              - 'crates/wenlan-types/build.rs'
              - 'crates/wenlan-server/src/**'
              - 'crates/wenlan-server/tests/**'
              - 'scripts/install-macos-app.sh'
              - 'scripts/test-install-macos-app.sh'
              - 'install.sh'
              - '.config/nextest.toml'
              - 'crates/**/Cargo.toml'
              - 'crates/**/build.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'version.txt'
              - '.release-please-manifest.json'
              - 'CHANGELOG.md'
              - '.github/workflows/ci.yml'
              - '.github/workflows/release.yml'
            windows:
              # Windows owns CLI/service/runtime portability, native ORT, and
              # packaging. drift_guard scans cfg-bearing Rust + PowerShell
              # paths so this list cannot silently miss a new Windows surface.
              - 'crates/wenlan-cli/src/**'
              - 'crates/wenlan-cli/tests/**'
              - 'crates/wenlan-server/src/**'
              - 'crates/wenlan-server/tests/**'
              - 'crates/wenlan-mcp/npm/install.js'
              - 'crates/wenlan-mcp/src/**'
              - 'crates/wenlan-mcp/Cargo.toml'
              - 'crates/wenlan-mcp/build.rs'
              - 'crates/wenlan-types/src/**'
              - 'crates/wenlan-types/Cargo.toml'
              - 'crates/wenlan-types/build.rs'
              - 'crates/wenlan-core/src/config.rs'
              - 'crates/wenlan-core/src/drift_guard.rs'
              - 'crates/wenlan-core/src/export/knowledge.rs'
              - 'crates/wenlan-core/src/repair.rs'
              - 'crates/wenlan-core/src/repair/**'
              - 'crates/wenlan-core/src/repair_plan/**'
              - 'crates/wenlan-core/src/sources/directory.rs'
              - 'crates/**/*.c'
              - 'crates/**/*.cc'
              - 'crates/**/*.cpp'
              - 'crates/**/*.cxx'
              - 'crates/**/*.h'
              - 'crates/**/*.hh'
              - 'crates/**/*.hpp'
              - 'crates/**/*.hxx'
              - 'scripts/stage-onnxruntime-windows.ps1'
              - 'scripts/smoke-windows.ps1'
              - 'scripts/smoke-windows-llm.ps1'
              - 'scripts/smoke-windows-llm.test.ps1'
              - 'scripts/stabilize-rust-cache-toolchains.sh'
              - 'scripts/stabilize-rust-cache-toolchains.test.sh'
              - 'scripts/lint-scale-gate.sh'
              - 'crates/wenlan-core/src/lint/**'
              - '.config/nextest.toml'
              - 'crates/wenlan-core/src/engine.rs'
              - 'crates/wenlan-core/src/llm_provider.rs'
              - 'crates/wenlan-core/src/bin/model_probe.rs'
              # Exact entry retained for the ORT feature-manifest contract;
              # the broader manifest glob below covers future crates too.
              - 'crates/wenlan-core/Cargo.toml'
              - 'crates/**/Cargo.toml'
              - 'crates/**/build.rs'
              - 'crates/*/npm/**'
              - 'install.sh'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'version.txt'
              - '.release-please-manifest.json'
              - 'CHANGELOG.md'
              - '.github/workflows/ci.yml'
              - '.github/workflows/release.yml'
            windows-lint:
              # The Windows functional lint-scale proof is useful only when
              # its implementation or harness changes.
              - 'crates/wenlan-core/src/lint/**'
              - 'scripts/lint-scale-gate.sh'
            windows-release:
              # Expensive release-profile proof is required only when a PR can
              # change native linkage, Cargo/build inputs, or packaged output.
              # Non-PR backstops run it regardless of this filter.
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - 'crates/**/Cargo.toml'
              - 'crates/**/build.rs'
              - 'crates/**/*.c'
              - 'crates/**/*.cc'
              - 'crates/**/*.cpp'
              - 'crates/**/*.cxx'
              - 'crates/**/*.h'
              - 'crates/**/*.hh'
              - 'crates/**/*.hpp'
              - 'crates/**/*.hxx'
              - 'crates/*/npm/**'
              - 'crates/wenlan-core/src/engine.rs'
              - 'crates/wenlan-core/src/llm_provider.rs'
              - 'crates/wenlan-core/src/bin/model_probe.rs'
              - 'crates/wenlan-server/src/main.rs'
              - 'crates/wenlan-mcp/npm/install.js'
              - 'install.sh'
              - 'scripts/stage-onnxruntime-windows.ps1'
              - 'scripts/smoke-windows.ps1'
              - 'scripts/smoke-windows-llm.ps1'
              - 'scripts/smoke-windows-llm.test.ps1'
              - 'version.txt'
              - '.release-please-manifest.json'
              - 'CHANGELOG.md'
              - '.github/workflows/ci.yml'
              - '.github/workflows/release.yml'
            mcp-platform:
              # The MCP runtime owns Unix/non-Unix cfg branches. Compile all
              # shipped targets on both platform owners only when its source,
              # runtime dependency graph, toolchain, or workflow changes.
              - 'crates/wenlan-mcp/src/**'
              - 'crates/wenlan-mcp/Cargo.toml'
              - 'crates/wenlan-mcp/build.rs'
              - 'crates/wenlan-types/src/**'
              - 'crates/wenlan-types/Cargo.toml'
              - 'crates/wenlan-types/build.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/release.yml'

      - id: matrix
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo 'json=["ubuntu-24.04", "macos-14", "windows-2022"]' >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.macos }}" = "true" ] && [ "${{ steps.filter.outputs.windows }}" = "true" ]; then
            echo 'json=["ubuntu-24.04", "macos-14", "windows-2022"]' >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.macos }}" = "true" ]; then
            echo 'json=["ubuntu-24.04", "macos-14"]' >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.windows }}" = "true" ]; then
            echo 'json=["ubuntu-24.04", "windows-2022"]' >> "$GITHUB_OUTPUT"
          else
            echo 'json=["ubuntu-24.04"]' >> "$GITHUB_OUTPUT"
          fi

  # On PRs, Rust fmt + lint only run when Rust-affecting paths changed.
  # Docs/image-only PRs should still get the required aggregate `conclusion`
  # check, but they should not spend runners on Cargo jobs. Non-PR runs keep the
  # full backstop. The fail-open surface is closed by `conclusion`, which
  # explicitly fails if `detect-changes` itself fails.
  fmt:
    name: fmt
    needs: [detect-changes]
    if: "needs.detect-changes.outputs.rust == 'true' || needs.detect-changes.outputs.macos == 'true' || needs.detect-changes.outputs.windows == 'true' || github.event_name != 'pull_request'"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-05-13
        with:
          toolchain: 1.95.0
          components: rustfmt
      - run: cargo fmt --check --all

  lint:
    name: lint
    needs: [detect-changes]
    if: "needs.detect-changes.outputs.rust == 'true' || needs.detect-changes.outputs.macos == 'true' || needs.detect-changes.outputs.windows == 'true' || github.event_name != 'pull_request'"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-05-13
        with:
          toolchain: 1.95.0
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Separate from `test` key — clippy emits *.rmeta only, test needs
          # *.rlib. Shared key loses because lint writes first and test then
          # gets a partial cache + recompiles from scratch.
          shared-key: clippy
          # Cache the full crates.io registry. Cold cache pulls thousands of
          # small files otherwise; cached restore is ~2-3min faster.
          cache-all-crates: "true"
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Verify wenlan-mcp uses path dep for wenlan-types
        run: |
          SOURCE=$(cargo metadata --format-version 1 --locked \
            | jq -r '.packages[]
                     | select(.name == "wenlan-mcp")
                     | .dependencies[]
                     | select(.name == "wenlan-types")
                     | .source // "PATH"')
          [[ "$SOURCE" == "PATH" ]] || { echo "ERROR: wenlan-mcp must use path dep for wenlan-types"; exit 1; }

  test:
    name: test (${{ matrix.os }})
    needs: [detect-changes]
    if: "needs.detect-changes.outputs.rust == 'true' || needs.detect-changes.outputs.macos == 'true' || needs.detect-changes.outputs.windows == 'true' || github.event_name != 'pull_request'"
    runs-on: ${{ matrix.os }}
    strategy:
      # Cancel the rest of the matrix when one OS fails. Saves ~20-30min
      # per PR when a real bug breaks all platforms — Linux/macOS catch
      # the same regression in 6-15min, Windows would have spent another
      # ~30min hitting the identical failure.
      fail-fast: true
      matrix:
        # Built dynamically by detect-changes.test-oses. Windows is
        # included only when detect-changes flags a Windows-affecting
        # file changed. Most PRs don't touch Windows-specific code paths
        # and pay the ~30min Windows tax anyway today.
        os: ${{ fromJSON(needs.detect-changes.outputs.test-oses) }}
    env:
      # Keep dev/test dependency fingerprints aligned and drop debuginfo. CI
      # has no debugger attached; this lets nextest and later debug binary
      # builds reuse more artifacts while trimming linker time + cache size.
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      FASTEMBED_CACHE_DIR: ${{ github.workspace }}/.fastembed_cache
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-05-13
        with:
          toolchain: 1.95.0
      # rust-cache hashes every installed rustup toolchain, including unrelated
      # versions preinstalled by the Windows runner image. Keep that external
      # image churn from invalidating Wenlan's pinned 1.95.0 target cache.
      - name: Validate Windows Rust cache toolchain stabilizer
        if: matrix.os == 'windows-2022'
        shell: bash
        run: bash scripts/stabilize-rust-cache-toolchains.test.sh
      - name: Stabilize Windows Rust cache toolchain inputs
        if: matrix.os == 'windows-2022'
        shell: bash
        run: bash scripts/stabilize-rust-cache-toolchains.sh
      - name: Set up sccache
        if: matrix.os == 'ubuntu-24.04'
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - name: Enable sccache (Linux)
        if: matrix.os == 'ubuntu-24.04'
        shell: bash
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: test
          cache-all-crates: "true"
      - name: Verify ort-sys source pin
        if: matrix.os == 'ubuntu-24.04'
        run: |
          python3 scripts/verify-ort-source-pin.test.py
          python3 scripts/verify-ort-source-pin.py
      # Windows needs sqlite3.lib for libsql linking (libsql does not bundle
      # SQLite on Windows). vcpkg ships sqlite3 prebuilt; one-shot install
      # before any cargo step.
      - name: Install sqlite3 (Windows only)
        if: matrix.os == 'windows-2022'
        run: |
          vcpkg install sqlite3:x64-windows-static-md
          "LIB=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md\lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh
      # The hosted runner currently exposes an unrelated onnxruntime.dll on
      # its default DLL search path. Dynamic-ORT tests must never pick that up:
      # stage the SHA-verified runtime before any inference-capable test and
      # pin the exact absolute path for all later Windows test steps.
      - name: Stage ONNX Runtime for Windows tests
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ortDir = Join-Path $env:RUNNER_TEMP "wenlan-test-onnxruntime"
          & scripts/stage-onnxruntime-windows.ps1 -DestinationDirectory $ortDir
          $ortDll = (Resolve-Path (Join-Path $ortDir "onnxruntime.dll")).Path
          "ORT_DYLIB_PATH=$ortDll" | Out-File -FilePath $env:GITHUB_ENV -Append
      # nextest runs tests as separate processes in parallel; ~2x faster
      # than `cargo test` on multi-core runners. Install on all 3 OSes.
      - name: Install cargo-nextest
        uses: taiki-e/install-action@3235f8901fd37ffed0052b276cec25a362fb82e9 # v2
        with:
          tool: cargo-nextest
      # Pin FastEmbed's cache independently of its upstream default and restore
      # it before the first model-consuming test.
      - name: Cache fastembed model (Linux)
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.FASTEMBED_CACHE_DIR }}
          key: fastembed-bge-base-en-v1.5-q-v2
          restore-keys: |
            fastembed-bge-base-en-v1.5-q-
      # Workspace lib tests skipped on Windows — Linux + macOS catch the
      # same cross-platform unit logic in ~5-15min vs 25min on Windows.
      # Windows-specific behavior (paths, mcp_add, schtasks) is covered
      # by `Integration tests wenlan-cli + wenlan-server` + the schtasks
      # install round-trip E2E further down.
      - name: Workspace lib tests (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: cargo nextest run --workspace --lib
      - name: Workspace lib tests (macOS)
        if: matrix.os == 'macos-14'
        # nextest spawns one process per test by default — sidesteps the
        # ONNX atexit FFI race that required --test-threads=1 with cargo test.
        # .config/nextest.toml still serializes wenlan-core's model/cache tests.
        run: cargo nextest run --workspace --lib
      - name: Page lint scale gate (Linux time + RSS)
        if: matrix.os == 'ubuntu-24.04'
        run: bash scripts/lint-scale-gate.sh "$RUNNER_TEMP/task-19-memory-lint-debugger-linux.txt"
      - name: Page lint scale gate (Windows functional)
        if: matrix.os == 'windows-2022' && (github.event_name != 'pull_request' || needs.detect-changes.outputs.windows-lint == 'true')
        shell: pwsh
        run: |
          # Functional portability only; the Linux leg owns time and RSS thresholds.
          $ErrorActionPreference = "Stop"
          $fixture = Join-Path $env:RUNNER_TEMP "lint-scale-fixture"
          $receipt = Join-Path $env:RUNNER_TEMP "task-19-memory-lint-debugger-windows.txt"
          $env:WENLAN_LINT_SCALE_FIXTURE = $fixture
          $setup = "lint::pages::diagnostic_scale_test::generate_diagnostic_scale_fixture"
          $gate = "lint::pages::diagnostic_scale_test::production_page_group_scale_gate"
          $head = git rev-parse HEAD
          @(
            "task=19 diagnostic scale and portability gate",
            "cwd=$PWD",
            "head=$head",
            "platform=Windows",
            "fixture_command=cargo test -p wenlan-core --lib $setup -- --ignored --exact --nocapture",
            "functional_command=cargo test -p wenlan-core --lib $gate -- --ignored --exact --nocapture",
            "model_embedder=not constructed or loaded"
          ) | Set-Content -Path $receipt
          cargo test -p wenlan-core --lib $setup -- --ignored --exact --nocapture 2>&1 |
            Tee-Object -FilePath $receipt -Append
          $setupCode = $LASTEXITCODE
          if ($setupCode -ne 0) { throw "scale fixture generation failed" }
          cargo test -p wenlan-core --lib $gate -- --ignored --exact --nocapture 2>&1 |
            Tee-Object -FilePath $receipt -Append
          $gateCode = $LASTEXITCODE
          "exit_code=$gateCode" | Add-Content -Path $receipt
          if ($gateCode -ne 0) { throw "Windows functional scale gate failed" }
      - name: Upload Page lint scale receipt
        if: always() && (matrix.os == 'ubuntu-24.04' || (matrix.os == 'windows-2022' && (github.event_name != 'pull_request' || needs.detect-changes.outputs.windows-lint == 'true')))
        uses: actions/upload-artifact@v4
        with:
          name: task-19-lint-scale-${{ matrix.os }}-${{ github.sha }}
          path: ${{ runner.temp }}/task-19-memory-lint-debugger-*.txt
          retention-days: 30
          if-no-files-found: error
      # Syntax and stub-behavior checks are cheap and independent of Rust
      # compilation. Run them before the long Windows Cargo steps so a broken
      # release harness fails in seconds rather than near the end of the job.
      - name: Validate Windows smoke harness
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tokens = $null
          $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path "scripts\smoke-windows-llm.ps1"),
            [ref]$tokens,
            [ref]$parseErrors
          ) | Out-Null
          if ($parseErrors.Count -ne 0) {
            $parseErrors | Format-List | Out-String | Write-Error
            throw "scripts\smoke-windows-llm.ps1 has PowerShell parse errors"
          }
          & scripts/smoke-windows-llm.test.ps1

      # Integration tests for wenlan-cli + wenlan-server. We deliberately do
      # NOT use `--workspace --tests` because that pulls in wenlan-core's
      # `eval_harness.rs` which requires `ANTHROPIC_API_KEY` (not in CI).
      # wenlan-core integration tests run via the Linux-only nextest step
      # below (chat_import_e2e + distillation_quality + provenance_p2 +
      # provenance_p3 + space_scoping_e2e + folder_ingest_e2e — the middle
      # three carry the cross-workspace-leak security tests and the P3
      # demotion regression; folder_ingest_e2e covers the full folder
      # sync/enrich/delete lifecycle in-process).
      - name: Integration tests wenlan-cli + wenlan-server
        run: cargo nextest run -p wenlan -p wenlan-server
      # Release-profile proof remains on every non-PR backstop and on PRs whose
      # diff can change native linkage, Cargo/build inputs, or packaging. Run
      # functional integration first, then prioritize release-only failures
      # ahead of the MCP runtime and debug artifact builds.
      - name: Build Windows release binaries
        if: matrix.os == 'windows-2022' && (github.event_name != 'pull_request' || needs.detect-changes.outputs.windows-release == 'true')
        shell: pwsh
        run: |
          cargo build --release -p wenlan -p wenlan-server -p wenlan-mcp
          cargo build --release -p wenlan-core --bin model_probe
      # The MCP runtime has platform-specific token/transport code, while its
      # test suite remains quarantined below. Compile the shipped lib/bin on
      # both platform owners; Linux quarantine owns test/dev-dependency targets.
      - name: Compile platform-owned MCP runtime
        if: (matrix.os == 'macos-14' || matrix.os == 'windows-2022') && (github.event_name != 'pull_request' || needs.detect-changes.outputs.mcp-platform == 'true')
        run: cargo check -p wenlan-mcp --lib --bins
      - name: Run integration tests (core) (Linux)
        if: matrix.os == 'ubuntu-24.04'
        # nextest process-per-test sidesteps the macOS SIGSEGV root cause
        # (ONNX atexit FFI race). No --test-threads=1 needed on ubuntu.
        # --features eval-harness: 4 of the 5 eval_* files below are gated
        # behind #![cfg(feature = "eval-harness")] — without the flag they
        # compile to 0 tests and pass silently. Explicit --test selection
        # keeps eval_harness.rs (needs ANTHROPIC_API_KEY) out of the build.
        run: cargo nextest run -p wenlan-core --features eval-harness --test chat_import_e2e --test distillation_quality --test provenance_p2 --test provenance_p3 --test space_scoping_e2e --test folder_ingest_e2e --test doc_reconcile_e2e --test page_citations_e2e --test build_env --test eval_cost_caps --test eval_report_paths --test eval_report_roundtrip --test eval_save_guards
      - name: Run embedding-only eval (main only, Linux)
        if: matrix.os == 'ubuntu-24.04' && github.ref == 'refs/heads/main'
        env:
          EVAL_BASELINES_DIR: ${{ runner.temp }}/origin-eval-canary
        run: cargo nextest run -p wenlan-core --lib --run-ignored=only eval::retrieval
      - name: Upload eval canary baseline (with env schema)
        if: always() && matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: eval-canary-baseline-${{ github.sha }}
          path: ${{ runner.temp }}/origin-eval-canary/*.json
          retention-days: 30
          if-no-files-found: warn
      - name: E2E wenlan background on/off (Linux user-systemd)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          set -euo pipefail
          sudo loginctl enable-linger "$(whoami)"
          uid="$(id -u)"
          export XDG_RUNTIME_DIR="/run/user/$uid"
          # Build native (cargo nextest run --workspace --lib already built tests,
          # but the install path needs the actual release-or-debug binaries).
          cargo build -p wenlan -p wenlan-server
          STAGE=$(mktemp -d)
          UNIT_PATH="$HOME/.config/systemd/user/wenlan-server.service"
          cp target/debug/wenlan target/debug/wenlan-server "$STAGE/"
          cleanup() {
            "$STAGE/wenlan" background off 2>/dev/null || true
            systemctl --user disable --now wenlan-server.service >/dev/null 2>&1 || true
            rm -f "$UNIT_PATH"
            systemctl --user daemon-reload >/dev/null 2>&1 || true
            rm -rf "$STAGE"
          }
          trap cleanup EXIT
          "$STAGE/wenlan" background on
          test -f "$UNIT_PATH"
          systemctl --user is-enabled wenlan-server
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:7878/api/health >/dev/null; then
              echo "    daemon healthy after ${i}s"
              break
            fi
            sleep 1
            if [ "$i" = "90" ]; then
              echo "FAIL: daemon did not start under systemd user service" >&2
              journalctl --user -u wenlan-server --no-pager | tail -50 >&2 || true
              exit 1
            fi
          done
          "$STAGE/wenlan" background off
          test -f "$UNIT_PATH"
          systemctl --user is-enabled wenlan-server
          active_state="$(systemctl --user show wenlan-server --property=ActiveState --value)"
          test "$active_state" = "inactive"
          echo "    Linux background on/off round-trip PASS"
      # Full-stack acceptance test over real HTTP: ingest a folder via the
      # shipped CLI, poll hybrid search for a sentinel string, delete a
      # file, re-sync, and assert the chunks are reaped while the sibling
      # survives. Complements the in-process folder_ingest_e2e above by
      # exercising the daemon boundary (routes, scheduler drain, CLI).
      # Reuses the binaries built by the background E2E and the cached
      # fastembed model restored above.
      - name: E2E folder ingest over HTTP (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: bash scripts/smoke-folder-ingest.sh
      # Ordinary Windows PR proof uses debug artifacts already warmed by the
      # integration suite. Stage the pinned DLL next to the daemon because the
      # scheduled task does not inherit ORT_DYLIB_PATH from this runner shell.
      - name: Build Windows contract binaries
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          cargo build -p wenlan -p wenlan-server
          & scripts/stage-onnxruntime-windows.ps1 `
            -DestinationDirectory "target\debug"

      - name: Validate Windows LLM probe
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: cargo test -p wenlan-core --bin model_probe

      - name: Native ORT smoke (Windows; release profile)
        if: matrix.os == 'windows-2022' && (github.event_name != 'pull_request' || needs.detect-changes.outputs.windows-release == 'true')
        shell: pwsh
        run: |
          & scripts/stage-onnxruntime-windows.ps1 `
            -DestinationDirectory "target\release"
          & scripts/smoke-windows.ps1 `
            -ExePath "target\release\wenlan-server.exe"

      # `wenlan background on` on Windows registers a per-user Task Scheduler
      # ONLOGON entry via schtasks.exe and triggers it immediately. We
      # verify the full round-trip: background on registers the task, daemon
      # binds /api/health, and background off stops the daemon while preserving
      # the task registration. Test cleanup removes the task separately.
      - name: E2E wenlan background on/off round-trip (Windows; schtasks)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          try {
            $backgroundOnOut = & target\debug\wenlan.exe background on 2>&1
            $backgroundOnCode = $LASTEXITCODE
            Write-Host "background on exit=$backgroundOnCode out=$backgroundOnOut"
            if ($backgroundOnCode -ne 0) { throw "background on failed: $backgroundOnOut" }

            # schtasks /query must report the task as present.
            & schtasks.exe /query /tn WenlanServer | Out-Null
            if ($LASTEXITCODE -ne 0) { throw "schtasks did not register WenlanServer" }

            # /run launched the daemon as a separate process. Poll /api/health.
            $healthy = $false
            for ($i = 0; $i -lt 30; $i++) {
              try {
                $r = Invoke-WebRequest -Uri "http://127.0.0.1:7878/api/health" -UseBasicParsing -TimeoutSec 1
                if ($r.StatusCode -eq 200) { $healthy = $true; break }
              } catch { }
              Start-Sleep -Seconds 1
            }
            if (-not $healthy) {
              & schtasks.exe /query /tn WenlanServer /fo LIST /v
              throw "daemon did not respond on /api/health after schtasks /run"
            }
            Write-Host "    daemon healthy under scheduled task"

            $backgroundOffOut = & target\debug\wenlan.exe background off 2>&1
            $backgroundOffCode = $LASTEXITCODE
            Write-Host "background off exit=$backgroundOffCode out=$backgroundOffOut"
            if ($backgroundOffCode -ne 0) { throw "background off failed: $backgroundOffOut" }

            # background off must preserve the task registration.
            & schtasks.exe /query /tn WenlanServer 2>&1 | Out-Null
            if ($LASTEXITCODE -ne 0) {
              throw "background off removed the WenlanServer scheduled task"
            }

            # The registered task remains, but its daemon must be unreachable.
            $healthReachable = $false
            try {
              $null = Invoke-WebRequest -Uri "http://127.0.0.1:7878/api/health" -UseBasicParsing -TimeoutSec 1
              $healthReachable = $true
            } catch {
              # An HTTP error response still proves the daemon is reachable;
              # only connection failure/timeout satisfies the stop contract.
              if ($null -ne $_.Exception.Response) { $healthReachable = $true }
            }
            if ($healthReachable) { throw "background off left /api/health reachable" }

            Write-Host "    Windows background on/off round-trip PASS"
          } finally {
            # Test-only cleanup: remove the preserved registration and kill any
            # leftover daemon so the runner is clean even when an assertion fails.
            Get-Process -Name wenlan-server -ErrorAction SilentlyContinue |
              Stop-Process -Force -ErrorAction SilentlyContinue

            $deleteOut = & schtasks.exe /delete /tn WenlanServer /f 2>&1
            $deleteCode = $LASTEXITCODE
            Write-Host "test cleanup delete exit=$deleteCode out=$deleteOut"
            if ($deleteCode -ne 0) {
              & schtasks.exe /query /tn WenlanServer 2>&1 | Out-Null
              if ($LASTEXITCODE -eq 0) {
                throw "test cleanup failed to remove the WenlanServer scheduled task"
              }
            }

            # Expected nonzero task-query/delete codes must not leak into the step.
            $global:LASTEXITCODE = 0
          }

  # Quarantine lane: exercises test files present in the tree but not wired
  # into the required `test` job (dormant wenlan-mcp / wenlan-types
  # integration suites). Excluded from `conclusion.needs` so it can never
  # gate merges; continue-on-error keeps the checks-tab from flagging red.
  # Promote a suite into `test` once proven stable here.
  test-quarantine:
    name: test-quarantine
    needs: [detect-changes]
    if: "needs.detect-changes.outputs.rust == 'true' || needs.detect-changes.outputs.macos == 'true' || needs.detect-changes.outputs.windows == 'true' || github.event_name != 'pull_request'"
    runs-on: ubuntu-24.04
    continue-on-error: true
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      FASTEMBED_CACHE_DIR: ${{ github.workspace }}/.fastembed_cache
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-05-13
        with:
          toolchain: 1.95.0
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Own key — a 2-crate subset shouldn't share keys with the full
          # `test`/`lint` caches.
          shared-key: quarantine
          cache-all-crates: "true"
      - name: Install cargo-nextest
        uses: taiki-e/install-action@3235f8901fd37ffed0052b276cec25a362fb82e9 # v2
        with:
          tool: cargo-nextest
      # real_router.rs boots a real MemoryDB, which loads the FastEmbed ONNX
      # model (network fetch if uncached). Reuse the cache from any previous
      # successful Linux consumer so this job normally skips the cold fetch.
      - name: Cache fastembed model (Linux)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.FASTEMBED_CACHE_DIR }}
          key: fastembed-bge-base-en-v1.5-q-v2
          restore-keys: |
            fastembed-bge-base-en-v1.5-q-
      - name: Quarantined tests (wenlan-mcp + wenlan-types)
        run: cargo nextest run -p wenlan-mcp -p wenlan-types

  docs:
    name: docs provenance
    needs: [detect-changes]
    if: needs.detect-changes.outputs.docs == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate README translations and eval provenance
        run: |
          python3 scripts/check-readme-translations.py
          bash scripts/check-readme-translations.test.sh
          python3 scripts/update-readme-eval.py --check docs/eval/readme_metrics.example.json
          python3 scripts/update-readme-eval.test.py
          bash scripts/validate-versions.test.sh

  # Aggregate gate for branch protection. `if: always()` lets docs-only PRs
  # (where the test matrix skips via detect-changes) report success instead
  # of stalling forever on a never-run required check.
  #
  # detect-changes.result is checked explicitly: if the path filter itself
  # fails, downstream jobs would be skipped silently. Every filtered job also
  # has an expected-vs-actual assertion: expected jobs must succeed and jobs
  # with no matching diff must be skipped.
  conclusion:
    name: conclusion
    needs: [detect-changes, fmt, lint, test, docs, plugin, npm]
    if: always() && !cancelled()
    runs-on: ubuntu-24.04
    steps:
      - name: Aggregate expected CI results
        run: |
          expect_job() {
            name="$1"
            expected="$2"
            actual="$3"
            if [ "$expected" = "true" ]; then
              if [ "$actual" != "success" ]; then
                echo "$name was required but result was $actual"
                exit 1
              fi
            elif [ "$actual" != "skipped" ]; then
              echo "$name was not required but result was $actual"
              exit 1
            fi
          }

          dc='${{ needs.detect-changes.result }}'
          if [ "$dc" != 'success' ]; then
            echo "detect-changes did not succeed: $dc"
            exit 1
          fi

          run_rust='${{ needs.detect-changes.outputs.rust == 'true' || needs.detect-changes.outputs.macos == 'true' || needs.detect-changes.outputs.windows == 'true' || github.event_name != 'pull_request' }}'
          expect_job fmt "$run_rust" '${{ needs.fmt.result }}'
          expect_job lint "$run_rust" '${{ needs.lint.result }}'
          expect_job test "$run_rust" '${{ needs.test.result }}'
          expect_job docs '${{ needs.detect-changes.outputs.docs == 'true' }}' '${{ needs.docs.result }}'
          expect_job plugin '${{ needs.detect-changes.outputs.plugin == 'true' }}' '${{ needs.plugin.result }}'
          expect_job npm '${{ needs.detect-changes.outputs.npm == 'true' }}' '${{ needs.npm.result }}'

  plugin:
    needs: detect-changes
    if: needs.detect-changes.outputs.plugin == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate plugin.json schema
        run: |
          jq -e '.name and .version and .description and .repository' plugin/.claude-plugin/plugin.json
          jq -e '.name and .version and .description and .repository and .skills and .mcpServers' plugin-codex/.codex-plugin/plugin.json
      - name: Validate plugin contracts
        run: |
          python3 scripts/validate-codex-plugin-slice.py
          python3 scripts/validate-plugin-contract.py
          bash scripts/validate-plugin-contract.test.sh
      - name: Validate skill frontmatter
        run: |
          for f in plugin/skills/*/SKILL.md; do
            head -5 "$f" | grep -qE '^name:|^description:' || { echo "Missing frontmatter: $f"; exit 1; }
          done
      - uses: DavidAnson/markdownlint-cli2-action@db43aef879112c3119a410d69f66701e0d530809 # v17
        with:
          globs: 'skills/**/*.md'
        continue-on-error: true   # initial relaxation; tighten after first run

  npm:
    needs: detect-changes
    if: needs.detect-changes.outputs.npm == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      - name: Validate wenlan-mcp npm package
        working-directory: crates/wenlan-mcp/npm
        run: |
          npm pack --dry-run
          node -c run.js
          node -c install.js
      - name: Validate wenlan npm package
        working-directory: crates/wenlan-cli/npm
        run: |
          npm pack --dry-run
          node -c run.js
