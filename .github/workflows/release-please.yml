name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json
          # GITHUB_TOKEN events don't trigger other workflows (GitHub security policy).
          # A fine-grained PAT with contents:write lets the tag push trigger release.yml.
          token: ${{ secrets.RELEASE_TOKEN }}

      # When a release PR is open, also bump Cargo.toml versions
      # (release-please can't handle Cargo workspace manifests).
      #
      # IMPORTANT: use the same RELEASE_TOKEN PAT that release-please-action
      # used to create the PR. The subsequent `git push` of synced version
      # files needs to fire a `pull_request synchronize` event so CI runs
      # against the new HEAD — GITHUB_TOKEN-driven pushes never trigger
      # downstream workflows (GitHub security policy), which would leave the
      # PR head with empty `statusCheckRollup` and block branch protection.
      - name: Checkout (for Cargo version sync)
        if: steps.release.outputs.pr != ''
        uses: actions/checkout@v4
        with:
          ref: release-please--branches--main
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Sync versions to all manifests
        if: steps.release.outputs.pr != ''
        run: bash scripts/bump-version.sh

      - name: Commit synced versions to release PR branch
        if: steps.release.outputs.pr != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock crates/origin-mcp/npm/package.json crates/origin-cli/npm/package.json plugin/.claude-plugin/plugin.json plugin/bin/origin-mcp-runner.sh plugin/skills/init/SKILL.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync versions to $(cat version.txt | tr -d '[:space:]')"
            git push origin HEAD
          else
            echo "No version drift; nothing to commit."
          fi
