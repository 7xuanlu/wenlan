name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for re-running a release build (e.g. after transient CI failure).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build (e.g. v0.1.2)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Resolved once, used everywhere. workflow_dispatch supplies the tag via input;
  # push supplies it via GITHUB_REF.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  prepare-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate version consistency
        run: bash scripts/validate-versions.sh
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Compose release body
        run: |
          VERSION="${RELEASE_TAG#v}"
          # Extract the latest version section from CHANGELOG.md (between first two ## headings)
          CHANGELOG=$(awk '/^## \['"$VERSION"'\]/{found=1; next} found && /^## \[/{exit} found' CHANGELOG.md)
          # Find the previous tag for the compare link
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')

          cat > release-body.md <<INSTALL_EOF
          ## What's Changed

          $CHANGELOG

          **Full Changelog**: https://github.com/7xuanlu/origin/compare/${PREV_TAG}...${RELEASE_TAG}

          ## Install

          **Origin setup (local runtime + daemon):**
          \`\`\`
          npx -y @7xuanlu/origin setup
          \`\`\`

          **MCP connector only:**
          \`\`\`
          npx -y origin-mcp
          \`\`\`

          **Exact release setup:**
          \`\`\`
          ORIGIN_RELEASE_TAG=${RELEASE_TAG} npx -y @7xuanlu/origin setup
          \`\`\`

          **Shell installer:**
          \`\`\`
          curl -fsSL https://raw.githubusercontent.com/7xuanlu/origin/main/install.sh | bash
          \`\`\`

          **Exact shell install for this release:**
          \`\`\`
          curl -fsSL https://raw.githubusercontent.com/7xuanlu/origin/${RELEASE_TAG}/install.sh | ORIGIN_RELEASE_TAG=${RELEASE_TAG} bash
          \`\`\`
          Downloads exact binaries and prints manual isolated daemon/MCP setup steps.

          > Origin works in local memory mode without a local model or API key. Distill cycles are opt-in with \`origin model install\` or \`origin key set anthropic\`.
          INSTALL_EOF

          # Strip leading whitespace from heredoc indentation
          sed -i 's/^          //' release-body.md
          echo "Release body written ($(wc -c < release-body.md) bytes)"

      - name: Create GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if [[ "$RELEASE_TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file release-body.md \
            $PRERELEASE_FLAG \
            || gh release edit "$RELEASE_TAG" --notes-file release-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Build & Publish ${{ matrix.target }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
            artifact_name: origin-darwin-arm64
          # x86_64-apple-darwin dropped from v0.7.0: `ort` 2.x does not
          # publish prebuilt ONNX Runtime binaries for Intel Mac. Adding it
          # back requires compiling ONNX from source (~15min build) or
          # switching to the `ort-tract` backend. Tracked as follow-up.
          # Native ARM Linux runner is free for public repos
          # (ubuntu-24.04-arm, 4 vCPU Cortex / 16GB). Drops cross entirely
          # for aarch64: no Docker container, no Cross.toml, no OpenSSL
          # version chasing. Same setup as x86 below.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
            artifact_name: origin-linux-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            archive: tar.gz
            artifact_name: origin-linux-x64
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: zip
            artifact_name: origin-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate version consistency
        if: runner.os != 'Windows'
        run: bash scripts/validate-versions.sh
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      # rust-toolchain.toml pins the workspace to 1.95.0. The previous
      # `@stable` install installed targets against the stable channel and
      # cargo ran with 1.95.0 (per rust-toolchain.toml override), so
      # `--target x86_64-apple-darwin` failed with `can't find crate for core`
      # — the target was added to the wrong toolchain. Pin explicitly to
      # mirror ci.yml.
      - name: Install Rust 1.95.0 with matrix target
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-05-13
        with:
          toolchain: 1.95.0
          targets: ${{ matrix.target }}

      # sccache caches rustc + build-script outputs to GHA. Big win on the
      # C/C++-heavy crates we pull (openssl-src, ring, llama-cpp-sys).
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # v0.0.9

      # vcpkg sqlite3 for Windows — libsql 0.9 needs `sqlite3.lib` at link
      # time and does not bundle SQLite on Windows. Mirrors ci.yml's test
      # step. GitHub `windows-2022` runner ships vcpkg preinstalled.
      - name: Install sqlite3 (Windows only)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          vcpkg install sqlite3:x64-windows-static-md
          "LIB=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md\lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          cache-all-crates: "true"

      # All targets build natively now. aarch64-unknown-linux-gnu uses the
      # free ubuntu-24.04-arm runner, x86_64-unknown-linux-gnu uses
      # ubuntu-24.04. No cross / zigbuild / QEMU needed. Eliminates an
      # entire class of openssl-sys/system-OpenSSL/container-version traps
      # that consumed several PRs for v0.7.0.
      - name: Build
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
          # Use rust-lld on Windows (ships with toolchain, ~3-5min faster
          # link than link.exe for our binary sizes). Linux + macOS keep
          # their default linkers (ld / ld64).
          RUSTFLAGS: ${{ runner.os == 'Windows' && '-C linker-flavor=lld-link' || '' }}
        run: cargo build --release -p origin -p origin-server -p origin-mcp --target ${{ matrix.target }}

      - name: Smoke
        shell: bash
        run: |
          ./target/${{ matrix.target }}/release/origin${{ runner.os == 'Windows' && '.exe' || '' }} --help
          ./target/${{ matrix.target }}/release/origin-server${{ runner.os == 'Windows' && '.exe' || '' }} --help

      - name: List Windows build artifacts
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        run: ls -la target/${{ matrix.target }}/release/ | head -30

      # ort 2.x caches link-time `.lib` artifacts under
      # `%LOCALAPPDATA%\ort.pyke.io\...` but does NOT keep onnxruntime.dll
      # there on Windows — the build script needs only the import lib for
      # link time. The bundled zip needs the runtime DLL co-located with
      # the .exe so users get a self-contained extract. Download ONNX
      # Runtime 1.20.0 (matches ort 2.0.0-rc.11) from Microsoft's releases
      # and stage onnxruntime.dll into target/release before packaging.
      - name: Bundle onnxruntime.dll (Windows)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          $ortVersion = "1.20.0"
          $zipUrl = "https://github.com/microsoft/onnxruntime/releases/download/v$ortVersion/onnxruntime-win-x64-$ortVersion.zip"
          $zipPath = "$env:RUNNER_TEMP\onnxruntime.zip"
          Write-Host "Downloading $zipUrl"
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath "$env:RUNNER_TEMP\ort-extracted" -Force
          $dll = Get-ChildItem -Path "$env:RUNNER_TEMP\ort-extracted" -Recurse -Filter onnxruntime.dll | Select-Object -First 1
          if (-not $dll) {
            Get-ChildItem -Path "$env:RUNNER_TEMP\ort-extracted" -Recurse | Format-Table FullName, Length
            throw "onnxruntime.dll not found in extracted zip"
          }
          $dest = "target\${{ matrix.target }}\release\onnxruntime.dll"
          Copy-Item -Path $dll.FullName -Destination $dest -Force
          Write-Host "Copied $($dll.FullName) -> $dest"

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            # No winsw.exe: service-manager 0.11's WinSwServiceManager invokes
            # an API winsw v2 doesn't support. Windows users install via the
            # sc.exe path which requires Administrator elevation. Documented
            # in AGENTS.md.
            7z a "dist/${{ matrix.artifact_name }}.zip" \
              "./target/${{ matrix.target }}/release/origin.exe" \
              "./target/${{ matrix.target }}/release/origin-server.exe" \
              "./target/${{ matrix.target }}/release/origin-mcp.exe" \
              "./target/${{ matrix.target }}/release/onnxruntime.dll"
          else
            tar -C "target/${{ matrix.target }}/release" -czf "dist/${{ matrix.artifact_name }}.tar.gz" \
              origin origin-server origin-mcp
          fi

      # Per-binary archive for origin-mcp consumed by the Homebrew tap formula.
      # Produced only on the darwin-arm64 leg to match the existing tap entry.
      - name: Package origin-mcp tarball for Homebrew (darwin-arm64 only)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/origin-mcp" origin-mcp
          tar -czf dist/origin-mcp-darwin-arm64.tar.gz origin-mcp
          rm origin-mcp

      # Per-binary archive for the origin CLI consumed by the Homebrew tap
      # formula. Darwin-arm64 only — matches the origin-mcp tap pattern.
      - name: Package origin CLI tarball for Homebrew (darwin-arm64 only)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/origin" origin
          tar -czf dist/origin-darwin-arm64.tar.gz origin
          rm origin

      - name: Upload archives to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ env.RELEASE_TAG }}
          # Don't touch the release body composed in prepare-release.
          append_body: false
          fail_on_unmatched_files: true

      - name: Upload Homebrew artifacts (origin + origin-mcp)
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-artifacts
          path: |
            dist/origin-darwin-arm64.tar.gz
            dist/origin-mcp-darwin-arm64.tar.gz

  docker:
    name: Build & Push Docker Image
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.daemon
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/7xuanlu/origin-server:${{ env.RELEASE_TAG }}
            ghcr.io/7xuanlu/origin-server:latest

  publish-crates:
    name: Publish crates.io (origin-types + origin-mcp)
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Pre-flight cargo publish dry-run
        # Only origin-types — origin-mcp's --dry-run resolves origin-types from
        # crates.io which doesn't have the new version until the publish step
        # runs. Real origin-mcp publish happens after origin-types is indexed.
        run: cargo publish -p origin-types --dry-run

      - name: Resolve workspace version
        id: version
        run: |
          VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | sed -E 's/version = "([^"]+)".*/\1/')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Workspace version: $VERSION"

      - name: Publish origin-types to crates.io
        # Always attempt when the version is not yet on crates.io.
        # Prior logic gated on "files changed since last tag" which silently
        # skipped publish when only the workspace version bumped without
        # origin-types code changes. v0.6.1 hit this: origin-types code was
        # stable so publish skipped, then origin-mcp 0.6.1 publish failed
        # because its `origin-types = "^0.6.1"` dep was unreachable. Both
        # crates stayed at 0.6.0 while the release job exited SUCCESS because
        # the trailing `|| echo "Already published, skipping"` masked it.
        # Registry check is the source of truth.
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          if curl -sf "https://crates.io/api/v1/crates/origin-types/${VERSION}" >/dev/null; then
            echo "origin-types ${VERSION} already on crates.io, skipping publish"
          else
            cargo publish -p origin-types
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for origin-types to be available on crates.io
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          for i in $(seq 1 30); do
            if curl -sf "https://crates.io/api/v1/crates/origin-types/${VERSION}" >/dev/null; then
              echo "origin-types ${VERSION} available"; exit 0
            fi
            echo "Waiting for crates.io to index origin-types ${VERSION}... ($i/30)"
            sleep 10
          done
          echo "ERROR: origin-types ${VERSION} not visible on crates.io after 5 min"
          exit 1

      - name: Publish origin-mcp to crates.io
        # Same registry-check pattern. Real errors from cargo publish now
        # propagate — the prior `|| echo "Already published, skipping"`
        # swallowed dependency-resolution errors and marked the job SUCCESS
        # while uploading nothing.
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          if curl -sf "https://crates.io/api/v1/crates/origin-mcp/${VERSION}" >/dev/null; then
            echo "origin-mcp ${VERSION} already on crates.io, skipping publish"
          else
            cargo publish -p origin-mcp
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: publish-crates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Sync npm version from tag
        working-directory: crates/origin-mcp/npm
        run: |
          VERSION="${RELEASE_TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Sync setup package version from tag
        working-directory: crates/origin-cli/npm
        run: |
          VERSION="${RELEASE_TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Copy root README and LICENSE into npm packages
        # npm renders README.md on the package page and surfaces LICENSE on
        # the package metadata. Copying root files ensures both packages
        # always reflect the current project description and the same legal
        # text the daemon ships under.
        run: |
          cp README.md crates/origin-mcp/npm/README.md
          cp README.md crates/origin-cli/npm/README.md
          cp LICENSE crates/origin-mcp/npm/LICENSE
          cp LICENSE crates/origin-cli/npm/LICENSE
      - name: Publish origin-mcp
        working-directory: crates/origin-mcp/npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @7xuanlu/origin
        working-directory: crates/origin-cli/npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: homebrew-artifacts
          merge-multiple: true
      - name: Compute checksums and update formulae
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          SHA_MCP_DARWIN_ARM64=$(sha256sum origin-mcp-darwin-arm64.tar.gz | cut -d' ' -f1)
          SHA_CLI_DARWIN_ARM64=$(sha256sum origin-darwin-arm64.tar.gz | cut -d' ' -f1)

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/7xuanlu/homebrew-tap.git tap
          mkdir -p tap/Formula

          cat > tap/Formula/origin-mcp.rb << 'FORMULA'
          class OriginMcp < Formula
            desc "MCP server for Origin — personal agent memory layer"
            homepage "https://github.com/7xuanlu/origin"
            version "VERSION_PLACEHOLDER"
            url "https://github.com/7xuanlu/origin/releases/download/vVERSION_PLACEHOLDER/origin-mcp-darwin-arm64.tar.gz"
            sha256 "SHA_PLACEHOLDER"
            license "Apache-2.0"

            livecheck do
              url :homepage
              strategy :github_latest
            end

            on_macos do
              depends_on arch: :arm64
            end

            def install
              bin.install "origin-mcp"
            end

            test do
              assert_match "origin-mcp", shell_output("#{bin}/origin-mcp --help")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" tap/Formula/origin-mcp.rb
          sed -i "s/SHA_PLACEHOLDER/${SHA_MCP_DARWIN_ARM64}/g" tap/Formula/origin-mcp.rb

          cat > tap/Formula/origin.rb << 'FORMULA'
          class Origin < Formula
            desc "Origin CLI — local-first memory + knowledge layer for AI agents"
            homepage "https://github.com/7xuanlu/origin"
            version "VERSION_PLACEHOLDER"
            url "https://github.com/7xuanlu/origin/releases/download/vVERSION_PLACEHOLDER/origin-darwin-arm64.tar.gz"
            sha256 "SHA_PLACEHOLDER"
            license "Apache-2.0"

            livecheck do
              url :homepage
              strategy :github_latest
            end

            on_macos do
              depends_on arch: :arm64
            end

            def install
              bin.install "origin"
            end

            test do
              assert_match "origin", shell_output("#{bin}/origin --help")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" tap/Formula/origin.rb
          sed -i "s/SHA_PLACEHOLDER/${SHA_CLI_DARWIN_ARM64}/g" tap/Formula/origin.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/origin-mcp.rb Formula/origin.rb
          git commit -m "origin + origin-mcp ${VERSION}"
          git push origin HEAD:main

      - name: Verify formula syntax
        run: |
          ruby -c tap/Formula/origin-mcp.rb
          ruby -c tap/Formula/origin.rb
