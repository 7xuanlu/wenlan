name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for re-running a release build (e.g. after transient CI failure).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build (e.g. v0.1.2)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Resolved once, used everywhere. workflow_dispatch supplies the tag via input;
  # push supplies it via GITHUB_REF.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  release:
    name: Build & Publish Daemon Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate version consistency
        run: bash scripts/validate-versions.sh
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build origin-server (release)
        run: cargo build --release -p origin-server --target aarch64-apple-darwin

      - name: Build origin-mcp (release)
        run: cargo build --release -p origin-mcp --target aarch64-apple-darwin

      - name: Smoke test origin-server
        run: ./target/aarch64-apple-darwin/release/origin-server --help

      - name: Compose release body
        run: |
          VERSION="${RELEASE_TAG#v}"
          # Extract the latest version section from CHANGELOG.md (between first two ## headings)
          CHANGELOG=$(awk '/^## \['"$VERSION"'\]/{found=1; next} found && /^## \[/{exit} found' CHANGELOG.md)
          # Find the previous tag for the compare link
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')

          cat > release-body.md <<INSTALL_EOF
          ## What's Changed

          $CHANGELOG

          **Full Changelog**: https://github.com/7xuanlu/origin/compare/${PREV_TAG}...${RELEASE_TAG}

          ## Install

          **Desktop app:** Download from [origin-app releases](https://github.com/7xuanlu/origin-app/releases/latest).

          **MCP integration (latest stable channel):**
          \`\`\`
          npx -y origin-mcp
          \`\`\`

          **Exact release on this page:**
          \`\`\`
          ORIGIN_RELEASE_TAG=${RELEASE_TAG} npx -y origin-mcp
          \`\`\`
          Uses isolated port/data-dir defaults so it does not replace the stable runtime.

          **Developer (headless daemon, latest stable):**
          \`\`\`
          curl -fsSL https://raw.githubusercontent.com/7xuanlu/origin/main/install.sh | bash
          \`\`\`

          **Exact shell install for this release:**
          \`\`\`
          curl -fsSL https://raw.githubusercontent.com/7xuanlu/origin/${RELEASE_TAG}/install.sh | ORIGIN_RELEASE_TAG=${RELEASE_TAG} bash
          \`\`\`
          Downloads exact binaries and prints manual isolated daemon/MCP setup steps.

          > Origin works in Basic Memory mode without a local LLM or API key. Local models are opt-in from \`origin model install\` or the desktop app.
          INSTALL_EOF

          # Strip leading whitespace from heredoc indentation
          sed -i '' 's/^          //' release-body.md
          echo "Release body written ($(wc -c < release-body.md) bytes)"

      - name: Create GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if [[ "$RELEASE_TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file release-body.md \
            $PRERELEASE_FLAG \
            || gh release edit "$RELEASE_TAG" --notes-file release-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload standalone origin-server binary
        run: |
          cp target/aarch64-apple-darwin/release/origin-server origin-server-aarch64-apple-darwin
          gh release upload "$RELEASE_TAG" \
            origin-server-aarch64-apple-darwin \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload standalone origin-mcp binary
        run: |
          cp target/aarch64-apple-darwin/release/origin-mcp origin-mcp-aarch64-apple-darwin
          gh release upload "$RELEASE_TAG" origin-mcp-aarch64-apple-darwin --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package origin-mcp for Homebrew
        run: |
          cp target/aarch64-apple-darwin/release/origin-mcp origin-mcp
          tar -czf origin-mcp-darwin-arm64.tar.gz origin-mcp
          rm origin-mcp

      - name: Upload origin-mcp tar for Homebrew
        run: |
          gh release upload "$RELEASE_TAG" origin-mcp-darwin-arm64.tar.gz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload origin-mcp artifacts for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: origin-mcp-artifacts
          path: |
            origin-mcp-darwin-arm64.tar.gz

  publish-crates:
    name: Publish crates.io (origin-types + origin-mcp)
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Pre-flight cargo publish dry-run
        # Only origin-types — origin-mcp's --dry-run resolves origin-types from
        # crates.io which doesn't have the new version until the publish step
        # runs. Real origin-mcp publish happens after origin-types is indexed.
        run: cargo publish -p origin-types --dry-run

      - name: Check if origin-types changed since last tag
        id: check-types
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only "$PREV_TAG" HEAD -- crates/origin-types/)
            if [ -n "$CHANGED" ]; then echo "changed=true" >> "$GITHUB_OUTPUT"; else echo "changed=false" >> "$GITHUB_OUTPUT"; fi
          fi

      - name: Publish origin-types to crates.io
        if: steps.check-types.outputs.changed == 'true' && env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish -p origin-types
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for origin-types to be available on crates.io
        if: steps.check-types.outputs.changed == 'true'
        run: |
          VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | sed -E 's/version = "([^"]+)".*/\1/')
          for i in $(seq 1 30); do
            if curl -sf "https://crates.io/api/v1/crates/origin-types/${VERSION}" >/dev/null; then
              echo "origin-types ${VERSION} available"; break
            fi
            echo "Waiting for crates.io to index origin-types ${VERSION}... ($i/30)"
            sleep 10
          done

      - name: Publish origin-mcp to crates.io
        run: cargo publish -p origin-mcp || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: publish-crates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Sync npm version from tag
        working-directory: crates/origin-mcp/npm
        run: |
          VERSION="${RELEASE_TAG#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Publish
        working-directory: crates/origin-mcp/npm
        run: npm publish --provenance --access public

  update-homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: origin-mcp-artifacts
          merge-multiple: true
      - name: Compute checksums and update formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          SHA_DARWIN_ARM64=$(sha256sum origin-mcp-darwin-arm64.tar.gz | cut -d' ' -f1)

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/7xuanlu/homebrew-tap.git tap
          mkdir -p tap/Formula

          cat > tap/Formula/origin-mcp.rb << 'FORMULA'
          class OriginMcp < Formula
            desc "MCP server for Origin — personal agent memory layer"
            homepage "https://github.com/7xuanlu/origin"
            version "VERSION_PLACEHOLDER"
            url "https://github.com/7xuanlu/origin/releases/download/vVERSION_PLACEHOLDER/origin-mcp-darwin-arm64.tar.gz"
            sha256 "SHA_PLACEHOLDER"
            license "Apache-2.0"

            livecheck do
              url :homepage
              strategy :github_latest
            end

            on_macos do
              depends_on arch: :arm64
            end

            def install
              bin.install "origin-mcp"
            end

            test do
              assert_match "origin-mcp", shell_output("#{bin}/origin-mcp --help")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" tap/Formula/origin-mcp.rb
          sed -i "s/SHA_PLACEHOLDER/${SHA_DARWIN_ARM64}/g" tap/Formula/origin-mcp.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/origin-mcp.rb
          git commit -m "origin-mcp ${VERSION}"
          git push origin HEAD:main

      - name: Verify formula syntax
        run: ruby -c tap/Formula/origin-mcp.rb
