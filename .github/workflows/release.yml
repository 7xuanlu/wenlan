name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for re-running a release build (e.g. after transient CI failure).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build (e.g. v0.1.2)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Resolved once, used everywhere. workflow_dispatch supplies the tag via input;
  # push supplies it via GITHUB_REF.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  release:
    name: Build & Publish Daemon Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate version consistency
        run: |
          TAG="${RELEASE_TAG#v}"

          CARGO_VERSION=$(grep '^version = ' crates/origin-server/Cargo.toml | head -1 | sed 's/version = "\([^"]*\)".*/\1/')

          echo "Tag version:                          $TAG"
          echo "crates/origin-server/Cargo.toml:      $CARGO_VERSION"

          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "ERROR: tag $TAG does not match crates/origin-server/Cargo.toml version $CARGO_VERSION"
            echo ""
            echo "Fix: run 'bash scripts/bump-version.sh $TAG' and push the updated files before tagging."
            exit 1
          fi

          echo "All versions consistent: $TAG"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build origin-server (release)
        run: cargo build --release -p origin-server --target aarch64-apple-darwin

      - name: Build origin-mcp (release)
        run: |
          cargo install --git https://github.com/7xuanlu/origin-mcp --root ./tmp-mcp

      - name: Smoke test origin-server
        run: ./target/aarch64-apple-darwin/release/origin-server --help

      - name: Compose release body
        run: |
          VERSION="${RELEASE_TAG#v}"
          # Extract the latest version section from CHANGELOG.md (between first two ## headings)
          CHANGELOG=$(awk '/^## \['"$VERSION"'\]/{found=1; next} found && /^## \[/{exit} found' CHANGELOG.md)
          # Find the previous tag for the compare link
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')

          cat > release-body.md <<INSTALL_EOF
          ## What's Changed

          $CHANGELOG

          **Full Changelog**: https://github.com/7xuanlu/origin/compare/${PREV_TAG}...${RELEASE_TAG}

          ## Install

          **Desktop app:** Download from [origin-app releases](https://github.com/7xuanlu/origin-app/releases/latest).

          **MCP integration (latest stable channel):**
          \`\`\`
          npx -y origin-mcp
          \`\`\`

          **Exact release on this page:**
          \`\`\`
          ORIGIN_RELEASE_TAG=${RELEASE_TAG} npx -y origin-mcp
          \`\`\`
          Uses isolated port/data-dir defaults so it does not replace the stable runtime.

          **Developer (headless daemon, latest stable):**
          \`\`\`
          curl -fsSL https://raw.githubusercontent.com/7xuanlu/origin/main/install.sh | bash
          \`\`\`

          **Exact shell install for this release:**
          \`\`\`
          curl -fsSL https://raw.githubusercontent.com/7xuanlu/origin/${RELEASE_TAG}/install.sh | ORIGIN_RELEASE_TAG=${RELEASE_TAG} bash
          \`\`\`
          Downloads exact binaries and prints manual isolated daemon/MCP setup steps.

          > Origin works in Basic Memory mode without a local LLM or API key. Local models are opt-in from \`origin model install\` or the desktop app.
          INSTALL_EOF

          # Strip leading whitespace from heredoc indentation
          sed -i '' 's/^          //' release-body.md
          echo "Release body written ($(wc -c < release-body.md) bytes)"

      - name: Create GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if [[ "$RELEASE_TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file release-body.md \
            $PRERELEASE_FLAG \
            || gh release edit "$RELEASE_TAG" --notes-file release-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload standalone origin-server binary
        run: |
          cp target/aarch64-apple-darwin/release/origin-server origin-server-aarch64-apple-darwin
          gh release upload "$RELEASE_TAG" \
            origin-server-aarch64-apple-darwin \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload standalone origin-mcp binary
        run: |
          cp tmp-mcp/bin/origin-mcp origin-mcp-aarch64-apple-darwin
          gh release upload "$RELEASE_TAG" \
            origin-mcp-aarch64-apple-darwin \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish crates.io (origin-types)
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Check if origin-types changed since last tag
        id: check-changed
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found; publishing origin-types for the first time."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only "$PREV_TAG" HEAD -- crates/origin-types/)
            if [ -n "$CHANGED" ]; then
              echo "origin-types changed since $PREV_TAG:"
              echo "$CHANGED"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "origin-types unchanged since $PREV_TAG; skipping publish."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Publish origin-types to crates.io
        if: steps.check-changed.outputs.changed == 'true' && env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish -p origin-types
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
