name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual trigger for re-running a release build (e.g. after transient CI failure).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build (e.g. v0.1.2)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Resolved once, used everywhere. workflow_dispatch supplies the tag via input;
  # push supplies it via GITHUB_REF.
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  release:
    name: Build & Publish Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Validate version consistency
        run: |
          TAG="${RELEASE_TAG#v}"

          CARGO_VERSION=$(grep '^version = ' app/Cargo.toml | head -1 | sed 's/version = "\([^"]*\)".*/\1/')
          TAURI_VERSION=$(node -p "require('./app/tauri.conf.json').version")
          PKG_VERSION=$(node -p "require('./package.json').version")

          echo "Tag version:         $TAG"
          echo "app/Cargo.toml:      $CARGO_VERSION"
          echo "app/tauri.conf.json: $TAURI_VERSION"
          echo "package.json:        $PKG_VERSION"

          MISMATCH=0
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "ERROR: tag $TAG does not match app/Cargo.toml version $CARGO_VERSION"
            MISMATCH=1
          fi
          if [ "$TAG" != "$TAURI_VERSION" ]; then
            echo "ERROR: tag $TAG does not match app/tauri.conf.json version $TAURI_VERSION"
            MISMATCH=1
          fi
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "ERROR: tag $TAG does not match package.json version $PKG_VERSION"
            MISMATCH=1
          fi

          if [ "$MISMATCH" -eq 1 ]; then
            echo ""
            echo "Fix: run 'bash scripts/bump-version.sh $TAG' and push the updated files before tagging."
            exit 1
          fi

          echo "All versions consistent: $TAG"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build origin-server
        run: cargo build --release -p origin-server --target aarch64-apple-darwin

      - name: Install origin-mcp sidecar
        run: |
          cargo install --git https://github.com/7xuanlu/origin-mcp --root ./tmp-mcp
          mkdir -p app/binaries
          cp tmp-mcp/bin/origin-mcp app/binaries/origin-mcp-aarch64-apple-darwin
          chmod +x app/binaries/origin-mcp-aarch64-apple-darwin

      - name: Download cloudflared sidecar
        run: |
          mkdir -p app/binaries
          curl -fsSL -o /tmp/cloudflared.tgz \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-darwin-arm64.tgz
          tar -xzf /tmp/cloudflared.tgz -C /tmp
          cp /tmp/cloudflared app/binaries/cloudflared-aarch64-apple-darwin
          chmod 755 app/binaries/cloudflared-aarch64-apple-darwin
          xattr -cr app/binaries/cloudflared-aarch64-apple-darwin

      - name: Copy origin-server sidecar
        run: |
          cp target/aarch64-apple-darwin/release/origin-server app/binaries/origin-server-aarch64-apple-darwin
          chmod +x app/binaries/origin-server-aarch64-apple-darwin

      - name: Smoke test origin-server
        run: ./target/aarch64-apple-darwin/release/origin-server --help

      - name: Import code signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          echo "Certificate imported successfully"
          security find-identity -v "$KEYCHAIN_PATH"

      - name: Compose release body
        run: |
          VERSION="${RELEASE_TAG#v}"
          # Extract the latest version section from CHANGELOG.md (between first two ## headings)
          CHANGELOG=$(awk '/^## \['"$VERSION"'\]/{found=1; next} found && /^## \[/{exit} found' CHANGELOG.md)
          # Find the previous tag for the compare link
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')

          cat > release-body.md <<INSTALL_EOF
          ## What's Changed

          $CHANGELOG

          **Full Changelog**: https://github.com/7xuanlu/origin/compare/${PREV_TAG}...${RELEASE_TAG}

          ## Install

          **Desktop app (macOS Apple Silicon):**
          Download the \`.dmg\` file below, open it, drag to Applications.
          Then run: \`xattr -cr /Applications/Origin.app\`

          **MCP integration (latest stable channel):**
          \`\`\`
          npx -y origin-mcp
          \`\`\`

          **Exact release on this page:**
          \`\`\`
          ORIGIN_RELEASE_TAG=${RELEASE_TAG} npx -y origin-mcp
          \`\`\`
          Uses isolated port/data-dir defaults so it does not replace the stable runtime.

          **Developer (headless daemon, latest stable):**
          \`\`\`
          curl -fsSL https://raw.githubusercontent.com/7xuanlu/origin/main/install.sh | bash
          \`\`\`

          **Exact shell install for this release:**
          \`\`\`
          curl -fsSL https://raw.githubusercontent.com/7xuanlu/origin/${RELEASE_TAG}/install.sh | ORIGIN_RELEASE_TAG=${RELEASE_TAG} bash
          \`\`\`
          Downloads exact binaries and prints manual isolated daemon/MCP setup steps.

          > Origin works in Basic Memory mode without a local LLM or API key. Local models are opt-in from the desktop app or `origin model install`.
          INSTALL_EOF

          # Strip leading whitespace from heredoc indentation
          sed -i '' 's/^          //' release-body.md
          echo "Release body written ($(wc -c < release-body.md) bytes)"

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          releaseBody: 'Building...'
          projectPath: app
          args: --target aarch64-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CXXFLAGS: "-std=c++17"
          # Ad-hoc sign ("-") when no Apple Developer cert is configured.
          # APPLE_ID/PASSWORD/TEAM_ID must be omitted (not empty) or Tauri
          # attempts notarization and fails on "Team ID must be at least 3 characters".
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Verify updater metadata
        run: |
          if ! gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name' | grep -qx latest.json; then
            echo "ERROR: latest.json was not uploaded. Check bundle.createUpdaterArtifacts and TAURI_SIGNING_PRIVATE_KEY."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload standalone origin-server binary
        run: |
          TAG="$RELEASE_TAG"
          cp target/aarch64-apple-darwin/release/origin-server origin-server-aarch64-apple-darwin
          gh release upload "$TAG" \
            origin-server-aarch64-apple-darwin \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload standalone origin-mcp binary
        run: |
          TAG="$RELEASE_TAG"
          cp tmp-mcp/bin/origin-mcp origin-mcp-aarch64-apple-darwin
          gh release upload "$TAG" \
            origin-mcp-aarch64-apple-darwin \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release body with changelog
        run: |
          gh release edit "$RELEASE_TAG" --notes-file release-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish crates.io (origin-types)
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Check if origin-types changed since last tag
        id: check-changed
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found; publishing origin-types for the first time."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only "$PREV_TAG" HEAD -- crates/origin-types/)
            if [ -n "$CHANGED" ]; then
              echo "origin-types changed since $PREV_TAG:"
              echo "$CHANGED"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "origin-types unchanged since $PREV_TAG; skipping publish."
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Publish origin-types to crates.io
        if: steps.check-changed.outputs.changed == 'true' && env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish -p origin-types
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
