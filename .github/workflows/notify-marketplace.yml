name: notify-marketplace

# When a release is promoted out of prerelease, tell the claude-plugins
# marketplace to re-sync pins. The marketplace's sync-marketplace workflow
# re-derives every plugin's pin itself, so this only needs to fire the dispatch
# (the client_payload is informational).
#
# `released`, not `published`: release-please publishes the release before any
# artifact exists, so `published` fired ~41 minutes early and pointed the
# marketplace at a version with no binaries and no npm package. `released` fires
# when release.yml's finalize-release clears the prerelease flag.
on:
  release:
    types: [released]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to claude-plugins
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_SYNC_TOKEN }}
        run: |
          # plugin=wenlan is the plugin name + /wenlan: namespace.
          gh api repos/7xuanlu/claude-plugins/dispatches \
            -f event_type=plugin-released \
            -F "client_payload[plugin]=wenlan" \
            -F "client_payload[tag]=${{ github.event.release.tag_name }}"
